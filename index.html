<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound GPS Test</title>

<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,sans-serif;
text-align:center;
padding:30px;
}

#speed{
font-size:100px;
margin-top:40px;
}

#info{
margin-top:20px;
font-size:18px;
line-height:1.6;
}
button{
font-size:24px;
padding:15px 35px;
}
</style>
</head>
<body>

<h1>GPS TEST</h1>

<button onclick="startGPS()">START</button>

<div id="speed">0</div>

<div id="info">
Bekliyor...
</div>

<script>

function startGPS(){

navigator.geolocation.watchPosition(

function(pos){

document.getElementById("speed").innerHTML =
Math.round(pos.coords.speed || 0);

document.getElementById("info").innerHTML =
"LAT: " + pos.coords.latitude +
"<br>LON: " + pos.coords.longitude +
"<br>ACCURACY: " + pos.coords.accuracy +
"<br>SPEED: " + pos.coords.speed +
"<br>TIME: " + new Date().toLocaleTimeString();

},

function(err){

document.getElementById("info").innerHTML =
"GPS ERROR: " + err.message;

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}

</script>

</body>
</html>
