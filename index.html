<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VoltSound</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#speed{
    font-size:120px;
    font-weight:200;
}

#info{
    font-size:18px;
    opacity:.7;
    margin-top:10px;
}

button{
    margin-top:40px;
    padding:18px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="info">Hazır</div>

<button id="start">START</button>

<script>

let idle, cruise, sport, boost;

function loadAudio(file){
    const a = new Audio(file);
    a.loop = true;
    a.volume = 0;
    return a;
}

function setVolumes(kmh){

    idle.volume = 0;
    cruise.volume = 0;
    sport.volume = 0;
    boost.volume = 0;

    if(kmh < 20){
        idle.volume = 1;
    }
    else if(kmh < 60){
        cruise.volume = 1;
    }
    else if(kmh < 120){
        sport.volume = 1;
    }
    else{
        boost.volume = 1;
    }
}

document.getElementById("start").onclick = async () => {

    idle   = loadAudio("idle.wav");
    cruise = loadAudio("cruise.wav");
    sport  = loadAudio("sport.wav");
    boost  = loadAudio("boost.wav");

    await idle.play();
    await cruise.play();
    await sport.play();
    await boost.play();

    idle.volume = 1;

    document.getElementById("info").innerText =
        "GPS bekleniyor...";

    navigator.geolocation.watchPosition(

        (pos) => {

            const raw = pos.coords.speed;
            const kmh = raw ? Math.round(raw * 3.6) : 0;

            document.getElementById("speed").innerText = kmh;

            document.getElementById("info").innerText =
                "GPS: " + raw;

            setVolumes(kmh);
        },

        (err) => {

            document.getElementById("info").innerText =
                "GPS Hatası";

            idle.volume = 1;
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );
};

</script>

</body>
</html>
