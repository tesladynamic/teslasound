<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VoltSound</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:-apple-system,sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#speed{
    font-size:120px;
    font-weight:200;
}

#status{
    margin-top:10px;
    opacity:.75;
}

button{
    margin-top:30px;
    padding:16px 40px;
    border:none;
    border-radius:12px;
    font-size:22px;
}
</style>
</head>
<body>

<div id="speed">0</div>
<div id="status">Hazır</div>

<button id="startBtn">START</button>

<script>

let currentAudio = null;
let currentMode = "";

let lastLat = null;
let lastLon = null;
let lastTime = null;

let previousKmh = 0;

const audioFiles = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

function playMode(mode){

    if(currentMode === mode) return;

    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    currentAudio = new Audio(audioFiles[mode]);

    currentAudio.loop = true;
    currentAudio.volume = 0.75;

    currentAudio.play();

    currentMode = mode;
}

function distance(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateSound(kmh){

    if(!currentAudio) return;

    let accel = kmh - previousKmh;

    let pitch = 1;

    if(currentMode === "idle"){
        pitch = 0.85 + (kmh / 20) * 0.40;
    }

    if(currentMode === "cruise"){
        pitch = 0.95 + ((kmh-20)/40) * 0.45;
    }

    if(currentMode === "sport"){
        pitch = 1.10 + ((kmh-60)/60) * 0.50;
    }

    if(currentMode === "boost"){
        pitch = 1.35 + ((kmh-120)/80) * 0.35;
    }

    if(accel > 1){
        pitch += 0.08;
    }

    if(accel < -1){
        pitch -= 0.08;
    }

    pitch = Math.max(0.8, Math.min(2.0, pitch));

    currentAudio.playbackRate = pitch;

    let volume = 0.65;

    if(accel > 1){
        volume += 0.10;
    }

    if(accel < -1){
        volume -= 0.10;
    }

    volume = Math.max(0.35, Math.min(1.0, volume));

    currentAudio.volume +=
        (volume - currentAudio.volume) * 0.15;

    previousKmh = kmh;
}

document.getElementById("startBtn").onclick = () => {

    playMode("idle");

    navigator.geolocation.watchPosition(

        pos => {

            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();

            let kmh = 0;

            if(lastLat !== null){

                const meters =
                    distance(
                        lastLat,
                        lastLon,
                        lat,
                        lon
                    );

                const seconds =
                    (now-lastTime)/1000;

                if(seconds > 0){
                    kmh =
                        (meters/seconds) * 3.6;
                }
            }

            lastLat = lat;
            lastLon = lon;
            lastTime = now;

            kmh = Math.round(kmh);

            document.getElementById("speed").innerText =
                kmh;

            let mode = "idle";

            if(kmh >= 20) mode = "cruise";
            if(kmh >= 60) mode = "sport";
            if(kmh >= 120) mode = "boost";

            playMode(mode);

            updateSound(kmh);

            document.getElementById("status").innerText =
                mode.toUpperCase();

        },

        err => {

            document.getElementById("status").innerText =
                "GPS ERROR";
        },

        {
            enableHighAccuracy:true,
            maximumAge:0
        }

    );

};

</script>

</body>
</html>
