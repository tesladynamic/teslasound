<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound - Zoom Transition</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fafafa;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.container{
    text-align:center;
    background:rgba(10, 10, 15, 0.75);
    border: 1px solid rgba(56, 189, 248, 0.3);
    padding: 40px 60px;
    border-radius: 32px;
    box-shadow: 0 0 50px rgba(56, 189, 248, 0.15);
    backdrop-filter: blur(16px);
    z-index: 2;
    position: relative;
    width: 280px;
    height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.slider-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Zoom Geçişli Paneller */
.panel {
    position: absolute;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
}

/* Başlangıç Paneli Aktif */
#startPanel {
    transform: scale(1);
    opacity: 1;
}

/* Başlat Paneli Gizlenirken Zoom-Out (küçülerek kaybolur) */
#startPanel.zoom-out {
    transform: scale(0.6);
    opacity: 0;
    pointer-events: none;
}

/* Kontrol Paneli Gizliyken Büyük Başlar (Zoom-In efekti için) */
#metricPanel {
    transform: scale(1.4);
    opacity: 0;
    pointer-events: none;
}

/* Kontrol Paneli Aktif Olurken Normal Boyuta Gelir */
#metricPanel.zoom-in {
    transform: scale(1);
    opacity: 1;
    pointer-events: auto;
}

#status{
    margin-bottom: 20px;
    padding: 10px 24px;
    background: rgba(56, 189, 248, 0.15);
    color: #38bdf8;
    border-radius: 20px;
    display: inline-block;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
}

button{
    padding: 18px 45px;
    font-size: 20px;
    font-weight: 600;
    color: #000;
    background: #38bdf8;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
    letter-spacing: 1px;
}

button:hover {
    background: #7dd3fc;
    box-shadow: 0 0 45px rgba(56, 189, 248, 0.8);
    transform: scale(1.05);
}

button.stop-btn {
    background: #ef4444;
    box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
    color: #fff;
    font-size: 16px;
    padding: 12px 30px;
}
button.stop-btn:hover {
    background: #f87171;
    box-shadow: 0 0 45px rgba(239, 68, 68, 0.8);
}
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<div class="container" id="mainContainer">
    <div class="slider-wrapper">
        <div id="startPanel" class="panel">
            <button id="actionBtn">BAŞLAT</button>
        </div>
        
        <div id="metricPanel" class="panel">
            <div id="status">SİSTEM HAZIR</div>
            <button id="stopBtn" class="stop-btn">DURDUR</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

let currentSpeedForVisual = 0;
let waveAngle = 0;
let isEngineRunning = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function animateWaves() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cy = canvas.height / 2;
    const speedFactor = isEngineRunning ? currentSpeedForVisual : 0;
    
    waveAngle += 0.03 + (speedFactor / 80);
    ctx.lineWidth = 2 + (speedFactor / 25);

    for (let w = 0; w < 3; w++) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(56, 189, 248, ${isEngineRunning ? (0.25 + (w * 0.15)) : 0.08})`;
        
        for (let x = 0; x < canvas.width; x += 10) {
            const frequency = 0.005 + (speedFactor * 0.00015);
            const amplitude = (isEngineRunning ? 40 : 15) + (speedFactor * 1.2);
            
            const y = cy + Math.sin(x * frequency + waveAngle + (w * 0.6)) * amplitude 
                      * Math.cos(waveAngle * 0.4);

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    requestAnimationFrame(animateWaves);
}
animateWaves();

let audioCtx = null;
let soundBuffers = {};
let activeSource = null;
let activeGain = null;
let biquadFilter = null;
let watchId = null;

let currentMode = "";
let lastLat = null;
let lastLon = null;
let lastTime = null;
let smoothedSpeed = 0;
let previousSpeed = 0;

const files = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

async function loadSounds() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        biquadFilter = audioCtx.createBiquadFilter();
        biquadFilter.type = "lowpass";
        biquadFilter.frequency.value = 400;
        biquadFilter.connect(audioCtx.destination);
    }

    for (let key in files) {
        if (!soundBuffers[key]) {
            try {
                const response = await fetch(files[key]);
                const arrayBuffer = await response.arrayBuffer();
                soundBuffers[key] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch(e) {
                console.error(key + " yüklenemedi:", e);
            }
        }
    }
}

function distanceMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function chooseMode(speed){
    if(speed < 30) return "idle";
    if(speed < 80) return "cruise";
    if(speed < 140) return "sport";
    return "boost";
}

function switchSoundMode(mode) {
    if(mode === currentMode) return;
    if(!soundBuffers[mode]) return;

    if(activeSource && activeGain) {
        try {
            activeGain.gain.setValueAtTime(activeGain.gain.value, audioCtx.currentTime);
            activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            let oldSource = activeSource;
            setTimeout(() => { try { oldSource.stop(); } catch(e){} }, 200);
        } catch(e){}
    }

    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[mode];
    source.loop = true;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.15);

    source.connect(gainNode);
    gainNode.connect(biquadFilter);
    source.start(0);

    activeSource = source;
    activeGain = gainNode;
    currentMode = mode;
}

function updateEngine(speed) {
    if(!activeSource) return;

    let rate = 0.80 + (speed / 120);
    rate = Math.max(0.75, Math.min(2.2, rate));

    activeSource.playbackRate.setValueAtTime(rate, audioCtx.currentTime);

    let targetFreq = 400 + (speed * 45);
    targetFreq = Math.max(400, Math.min(9000, targetFreq));
    biquadFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);

    previousSpeed = speed;
}

document.getElementById("actionBtn").onclick = async () => {
    document.getElementById("actionBtn").innerText = "BAŞLATILIYOR...";
    await loadSounds();
    
    if(audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    switchSoundMode("idle");

    // ZOOM EFEKTİ: Başlat paneli küçülerek uzaklaşır, durdur paneli zoom yaparak içeri girer
    document.getElementById("startPanel").classList.add("zoom-out");
    document.getElementById("metricPanel").classList.add("zoom-in");
    
    isEngineRunning = true;

    watchId = navigator.geolocation.watchPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();
            let kmh = 0;

            if(lastLat !== null){
                const meters = distanceMeters(lastLat, lastLon, lat, lon);
                const seconds = (now - lastTime) / 1000;
                if(seconds > 0) kmh = (meters / seconds) * 3.6;
            }

            lastLat = lat; lastLon = lon; lastTime = now;
            smoothedSpeed += (kmh - smoothedSpeed) * 0.15;
            const speed = Math.max(0, Math.round(smoothedSpeed));

            currentSpeedForVisual = speed;

            const mode = chooseMode(speed);
            switchSoundMode(mode);
            updateEngine(speed);

            document.getElementById("status").innerText = `${mode.toUpperCase()} (${speed} KM/H)`;
        },
        err => { 
            document.getElementById("status").innerText = "GPS BEKLENİYOR..."; 
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
};

document.getElementById("stopBtn").onclick = () => {
    if(!audioCtx) return;

    if(activeGain) {
        try {
            activeGain.gain.setValueAtTime(activeGain.gain.value, audioCtx.currentTime);
            activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        } catch(e){}
    }

    // ZOOM EFEKTİ: Durdur paneli zoom-out ile küçülür, başlat paneli yerine geri zoom yapar
    document.getElementById("metricPanel").classList.remove("zoom-in");
    document.getElementById("startPanel").classList.remove("zoom-out");
    document.getElementById("actionBtn").innerText = "BAŞLAT";

    setTimeout(() => {
        if(activeSource) {
            try { activeSource.stop(); } catch(e){}
            activeSource = null;
        }
        activeGain = null;
        currentMode = "";

        if(watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        lastLat = null;
        lastLon = null;
        lastTime = null;
        smoothedSpeed = 0;
        previousSpeed = 0;
        currentSpeedForVisual = 0;
        isEngineRunning = false;

        document.getElementById("status").innerText = "SİSTEM HAZIR";
    }, 550);
};
</script>

</body>
</html>
