<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound - Neon Wave</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fafafa;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.container{
    text-align:center;
    background:rgba(10, 10, 15, 0.65);
    border: 1px solid rgba(56, 189, 248, 0.25);
    padding: 40px 60px;
    border-radius: 28px;
    box-shadow: 0 0 60px rgba(56, 189, 248, 0.2);
    backdrop-filter: blur(14px);
    z-index: 2;
}

#speed{
    font-size: 140px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -2px;
    color: #38bdf8;
    text-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
}

.unit {
    font-size: 20px;
    opacity: 0.5;
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#status{
    margin-top: 20px;
    padding: 6px 18px;
    background: rgba(56, 189, 248, 0.15);
    color: #38bdf8;
    border-radius: 20px;
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
}

button{
    margin-top: 35px;
    padding: 18px 45px;
    font-size: 20px;
    font-weight: 600;
    color: #000;
    background: #38bdf8;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
}

button:hover {
    background: #7dd3fc;
    transform: translateY(-2px);
}
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<div class="container">
    <div id="speed">0</div>
    <div class="unit">KM/H</div>
    <div id="status">SİSTEM HAZIR</div>
    <br>
    <button id="startBtn">MOTORU ÇALIŞTIR</button>
</div>

<script>
// --- NEON IŞIK DALGALARI ANİMASYONU ---
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

let currentSpeedForVisual = 0;
let waveAngle = 0;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function animateWaves() {
    // Siyah arka planı hafif iz bırakacak şekilde temizliyoruz
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cy = canvas.height / 2;
    
    // Hızlandıkça dalgaların hareket hızı ve genliği artar
    waveAngle += 0.04 + (currentSpeedForVisual / 80);
    ctx.lineWidth = 2 + (currentSpeedForVisual / 25);

    // Üç katmanlı neon ışık dalgası
    for (let w = 0; w < 3; w++) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(56, 189, 248, ${0.2 + (w * 0.15)})`;
        
        for (let x = 0; x < canvas.width; x += 10) {
            const frequency = 0.005 + (currentSpeedForVisual * 0.00015);
            const amplitude = 40 + (currentSpeedForVisual * 1.2);
            
            const y = cy + Math.sin(x * frequency + waveAngle + (w * 0.6)) * amplitude 
                      * Math.cos(waveAngle * 0.4);

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    requestAnimationFrame(animateWaves);
}
animateWaves();


// --- SES VE HIZ MOTORU ---
let audioCtx = null;
let soundBuffers = {};
let activeSource = null;
let biquadFilter = null;

let currentMode = "";
let lastLat = null;
let lastLon = null;
let lastTime = null;
let smoothedSpeed = 0;
let previousSpeed = 0;

const files = {
    idle: "idle.wav",
    cruise: "cruise.wav",
    sport: "sport.wav",
    boost: "boost.wav"
};

async function loadSounds() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    biquadFilter = audioCtx.createBiquadFilter();
    biquadFilter.type = "lowpass";
    biquadFilter.frequency.value = 400;
    biquadFilter.connect(audioCtx.destination);

    for (let key in files) {
        try {
            document.getElementById("status").innerText = `${key.toUpperCase()} YÜKLENİYOR...`;
            const response = await fetch(files[key]);
            const arrayBuffer = await response.arrayBuffer();
            soundBuffers[key] = await audioCtx.decodeAudioData(arrayBuffer);
        } catch(e) {
            console.error(key + " yüklenemedi:", e);
        }
    }
}

function distanceMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function chooseMode(speed){
    if(speed < 30) return "idle";
    if(speed < 80) return "cruise";
    if(speed < 140) return "sport";
    return "boost";
}

function switchSoundMode(mode) {
    if(mode === currentMode) return;
    if(!soundBuffers[mode]) return;

    if(activeSource) {
        try { activeSource.stop(); } catch(e){}
    }

    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[mode];
    source.loop = true;

    source.connect(biquadFilter);
    source.start(0);

    activeSource = source;
    currentMode = mode;
}

function updateEngine(speed) {
    if(!activeSource) return;

    const accel = speed - previousSpeed;
    let rate = 0.80 + (speed / 120);
    rate = Math.max(0.75, Math.min(2.2, rate));

    activeSource.playbackRate.setValueAtTime(rate, audioCtx.currentTime);

    let targetFreq = 400 + (speed * 45);
    targetFreq = Math.max(400, Math.min(9000, targetFreq));
    biquadFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);

    previousSpeed = speed;
}

document.getElementById("startBtn").onclick = async () => {
    document.getElementById("status").innerText = "SESLER HAZIRLANIYOR...";
    await loadSounds();
    
    if(audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    switchSoundMode("idle");
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("status").innerText = "IDLE";

    navigator.geolocation.watchPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const now = Date.now();
            let kmh = 0;

            if(lastLat !== null){
                const meters = distanceMeters(lastLat, lastLon, lat, lon);
                const seconds = (now - lastTime) / 1000;
                if(seconds > 0) kmh = (meters / seconds) * 3.6;
            }

            lastLat = lat; lastLon = lon; lastTime = now;
            smoothedSpeed += (kmh - smoothedSpeed) * 0.15;
            const speed = Math.max(0, Math.round(smoothedSpeed));

            currentSpeedForVisual = speed;

            document.getElementById("speed").innerText = speed;

            const mode = chooseMode(speed);
            switchSoundMode(mode);
            updateEngine(speed);

            document.getElementById("status").innerText = `${mode.toUpperCase()} (${speed} KM/H)`;
        },
        err => { 
            document.getElementById("status").innerText = "GPS HATASI / İZİN GEREKLİ"; 
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
};
</script>

</body>
</html>
