<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound</title>

<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,sans-serif;
text-align:center;
padding:30px;
}

#speed{
font-size:100px;
margin-top:40px;
}

#info{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

button{
font-size:24px;
padding:15px 35px;
}
</style>
</head>

<body>

<h1>VOLTSOUND</h1>

<button onclick="startGPS()">START</button>

<div id="speed">0</div>

<div id="info">
Bekliyor...
</div>


<audio id="engineA" loop></audio>
<audio id="engineB" loop></audio>


<script>

let engineA = document.getElementById("engineA");
let engineB = document.getElementById("engineB");

let active = engineA;
let standby = engineB;

let currentSound = "";

let smoothSpeed = 0;


function fadeTo(file){

if(currentSound === file) return;

currentSound = file;


// yeni sesi hazırla

standby.src = file;
standby.volume = 0;

standby.play();


// crossfade

let step = 0.05;

let fade = setInterval(()=>{

if(standby.volume < 1){
standby.volume += step;
}

if(active.volume > 0){
active.volume -= step;
}


if(standby.volume >= 1){

active.pause();
active.currentTime = 0;

let temp = active;
active = standby;
standby = temp;

clearInterval(fade);

}

},50);

}



function startGPS(){

fadeTo("idle.wav");


navigator.geolocation.watchPosition(

function(pos){


let gpsSpeed = pos.coords.speed || 0;


// m/s -> km/h

let speed = gpsSpeed * 3.6;


// yumuşatma

smoothSpeed =
smoothSpeed + (speed - smoothSpeed)*0.15;


speed = smoothSpeed;



document.getElementById("speed").innerHTML =
Math.round(speed);



let target;


// geçiş toleransı

if(speed < 15){

target="idle.wav";

}
else if(speed < 55){

target="cruise.wav";

}
else if(speed < 105){

target="sport.wav";

}
else{

target="boost.wav";

}


fadeTo(target);


// devir hissi

active.playbackRate =
Math.min(2,0.8 + speed/150);



document.getElementById("info").innerHTML =
"SPEED: "+Math.round(speed)+
"<br>GPS RAW: "+pos.coords.speed;


},


function(err){

document.getElementById("info").innerHTML =
"GPS ERROR: "+err.message;

},


{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}

</script>

</body>
</html>
