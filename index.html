<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoltSound</title>

<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,sans-serif;
text-align:center;
padding:30px;
}

#speed{
font-size:100px;
margin-top:40px;
}

#info{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

button{
font-size:24px;
padding:15px 35px;
}
</style>
</head>

<body>

<h1>VOLTSOUND</h1>

<button onclick="startGPS()">START</button>

<div id="speed">0</div>

<div id="info">
Bekliyor...
</div>

<audio id="engine" loop></audio>


<script>

let engine = document.getElementById("engine");
let currentSound = "";

let CALIBRATION = 3.5;


function playSound(file){

if(currentSound === file) return;

currentSound = file;

engine.src = file;
engine.play();

}


function startGPS(){

// İlk sesi hemen başlat
engine.src = "idle.wav";
engine.volume = 1;
currentSound = "idle.wav";

engine.play();


navigator.geolocation.watchPosition(

function(pos){

let gpsSpeed = pos.coords.speed || 0;

// m/s -> km/h + Tesla kalibrasyonu
let speed = gpsSpeed * 3.6 * CALIBRATION;


document.getElementById("speed").innerHTML =
Math.round(speed);


// Ses seçimi

if(speed < 20){

playSound("idle.wav");

}
else if(speed < 60){

playSound("cruise.wav");

}
else if(speed < 100){

playSound("sport.wav");

}
else{

playSound("boost.wav");

}


// Motor devri hissi

engine.playbackRate =
Math.min(2, 0.8 + speed / 150);



document.getElementById("info").innerHTML =
"SPEED: " + Math.round(speed) +
"<br>GPS RAW: " + pos.coords.speed +
"<br>LAT: " + pos.coords.latitude +
"<br>LON: " + pos.coords.longitude;


},


function(err){

document.getElementById("info").innerHTML =
"GPS ERROR: " + err.message;

},


{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}

</script>

</body>
</html>
